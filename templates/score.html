<body class="bg-background text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface dark:bg-on-background border-b border-outline-variant dark:border-outline flex justify-between items-center px-4 sm:px-lg h-16 w-full shadow-sm gap-2">
<div class="font-headline-md text-[16px] sm:text-headline-md font-bold text-primary dark:text-primary-fixed truncate flex-1 min-w-0">
            Generate Custom Mock Test
        </div>
<div class="flex items-center gap-md">
</div>
</header>
<main class="pt-32 pb-24 px-gutter max-w-[800px] mx-auto min-h-screen">
<!-- Hero Section: Score Gauge -->
<section class="bg-surface border border-outline-variant rounded-xl p-xl shadow-sm text-center mb-gutter flex flex-col items-center">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-lg">Assessment Complete</h1>
<div class="relative w-48 h-48 flex items-center justify-center mb-lg">
<!-- Circular Gauge -->
<div class="score-gauge absolute inset-0 w-full h-full opacity-10"></div>
<div class="absolute inset-0 rounded-full border-[12px] border-outline-variant"></div>
<svg class="absolute inset-0 w-full h-full -rotate-90">
<circle cx="50%" cy="50%" fill="transparent" r="88" stroke="#1e40af" stroke-dasharray="552.92" stroke-dashoffset="82.93" stroke-linecap="round" stroke-width="12"></circle>
</svg>
<div class="flex flex-col items-center">
<span id="score-percentage" class="font-headline-xl text-headline-xl text-primary">0%</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Overall Score</span>
</div>
</div>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md">
                Excellent work! You have successfully passed the certification mock exam. Review your detailed metrics below to identify areas for improvement.
            </p>
</section>
<!-- Performance Summary Grid -->
<section class="grid grid-cols-1 md:grid-cols-3 gap-gutter mb-xl">
<!-- Correct Answers -->
<div class="bg-surface border border-outline-variant rounded-lg p-lg flex flex-col items-center text-center">
<div class="bg-green-100 text-green-700 p-base rounded-full mb-base">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<span id="correct-count" class="font-headline-md text-headline-md text-on-surface">0</span>
<span class="font-label-md text-label-md text-on-surface-variant">Correct</span>
</div>
<!-- Incorrect Answers -->
<div class="bg-surface border border-outline-variant rounded-lg p-lg flex flex-col items-center text-center">
<div class="bg-red-100 text-red-700 p-base rounded-full mb-base">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">cancel</span>
</div>
<span id="incorrect-count" class="font-headline-md text-headline-md text-on-surface">0</span>
<span class="font-label-md text-label-md text-on-surface-variant">Incorrect</span>
</div>
<!-- Skipped Answers -->
<div class="bg-surface border border-outline-variant rounded-lg p-lg flex flex-col items-center text-center">
<div class="bg-gray-100 text-gray-700 p-base rounded-full mb-base">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">block</span>
</div>
<span id="skipped-count" class="font-headline-md text-headline-md text-on-surface">0</span>
<span class="font-label-md text-label-md text-on-surface-variant">Skipped</span>
</div>
</section>
<!-- Visual Context Card removed -->
<!-- Actions -->
<div class="flex flex-col md:flex-row items-center justify-center gap-gutter">
<button id="review-btn" class="w-full md:w-auto px-xl py-md bg-primary text-on-primary rounded-lg font-label-md text-label-md shadow-sm hover:bg-primary-container transition-all active:scale-95 flex items-center justify-center gap-base">
<span class="material-symbols-outlined">analytics</span>
                Review Answers
            </button>
<a href="{{ url_for('instructions_page') }}" class="w-full md:w-auto px-xl py-md border border-primary text-primary rounded-lg font-label-md text-label-md hover:bg-surface-container-low transition-all active:scale-95 flex items-center justify-center gap-base">
<span class="material-symbols-outlined">home</span>
                Return Home
            </a>
</div>

<!-- Review Container -->
<div id="review-container" class="hidden mt-xl space-y-md w-full flex flex-col">
</div>

</main>


<script src="{{ url_for('static', filename='score.js') }}"></script>
</body></html>
